services:
  jenkins:
    build: .
    container_name: jenkins-yas
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
      - SONAR_HOST_URL=http://sonarqube-yas:9000
    networks:
      - yas-network
    restart: always # Tự động khởi động lại nếu có lỗi

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-yas
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db-sonar:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      # Tối ưu RAM cho Java bên trong container SonarQube
      - SONAR_CE_JAVAOPTS=-Xmx512m -Xms128m
      - SONAR_WEB_JAVAOPTS=-Xmx512m -Xms128m
    networks:
      - yas-network
    depends_on:
      - db-sonar
    restart: always
    # Giới hạn RAM cho container để tránh treo máy host (Yêu cầu tối thiểu 2GB cho SonarQube)
    deploy:
      resources:
        limits:
          memory: 2G

  db-sonar:
    image: postgres:15
    container_name: db-sonar-yas
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    networks:
      - yas-network
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    restart: always

networks:
  yas-network:
    driver: bridge

volumes:
  jenkins_home:
  postgres_sonar_data: